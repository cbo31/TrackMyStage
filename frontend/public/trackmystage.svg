<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#gradRed)"/>

  <!-- Curved path -->
  <path 
    d="M6 24 C10 16, 18 16, 24 10" 
    fill="none" 
    stroke="#ffffff" 
    stroke-width="2.5" 
    stroke-linecap="round"/>

  <!-- Arrow head aligned with curve -->
  <polygon 
    points="26.9,7.6 22,8 25.5,12.5" 
    fill="#ffffff"/>

  <!-- Start point -->
  <circle cx="6" cy="24" r="2.2" fill="#ffffff"/>
</svg>