# Redirection HTTP -> HTTPS
server {
    listen 80;
    server_name trackmystage.cbodev.fr;
    return 301 https://$host$request_uri;
}

# Serveur HTTPS
server {
    listen 443 ssl http2;
    server_name trackmystage.cbodev.fr;

    # SSL certificates 
    ssl_certificate /etc/letsencrypt/live/trackmystage.cbodev.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trackmystage.cbodev.fr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 1M;

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # API Backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Django static files (admin, etc.)
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
    }

    # Django MediaFiles 
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 7d;
    }
}